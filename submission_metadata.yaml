methodology_summary: |
  Offline deterministic candidate ranker that prioritizes grounded career evidence over raw skill lists.
  The pipeline extracts retrieval, ranking, production, engineering, and differentiator evidence; applies
  credibility and bounded availability modifiers; and writes recruiter-facing top-100 explanations through
  a deterministic grounded reasoning layer. Final submission ordering is descending score, then candidate_id
  ascending. Semantic scoring is disabled by default in the submitted release configuration.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  cpu_only_ranking: true
  network_during_ranking: false
  hosted_api_during_ranking: false
  gpu_during_ranking: false
  semantic_runtime_behavior: "disabled by default"
  hosted_llm_calls_in_final_runtime: false
  honeypot_check_done: false
  reproduction_tested: true
